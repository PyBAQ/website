name: "Prueba despliegue roto"

on:
  pull_request:
    branches:
      - "*"
  push:
    branches:
      - "deploy-debug"
  workflow_dispatch:
    # Allow manually running workflow
  # schedule:
    # - cron: "23 2 * * *"

env:
  DEPLOY: >-
    ${{
    github.event_name != 'pull_request'
    &&
    github.ref == 'refs/heads/deploy-debug'
    }}
  OUTPUT: _html
  TZ: America/Bogota

jobs:
  build:
    name: Construir sitio web lektor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Instalar Lektor
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verificar Pylint
        run: pylint --recursive=y scripts

      - name: Construir pagina pybaq
        run: lektor build -O '${{ env.OUTPUT }}'

